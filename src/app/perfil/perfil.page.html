<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <div style="text-align:center; margin-top: 24px; margin-bottom: 24px;">
    <p style="font-size: 24px; font-weight: 600; margin: 0;">{{ nombreUsuario }}</p>
    <p style="color: var(--ion-color-medium); margin: 4px 0 0;">
      {{ esAdmin ? 'Administrador' : 'Operador' }}
    </p>
  </div>

  <ion-button expand="block" mode="ios" color="danger" (click)="cerrarSesion()">
    Cerrar sesión
  </ion-button>

</ion-content>
