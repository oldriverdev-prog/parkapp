<ion-content [fullscreen]="true">

  <div class="ion-padding">

    <div style="margin-top: 60px; width: 100%; height: 24px;"></div>

    <img src="assets/images/parkapp_logo.png" alt="ParkApp"
      style="display:block; margin:0 auto; width:150px; max-width:45%; border-radius:18px;">

    <h1 class="ion-text-center" style="font-weight: 600; font-size: 50px; color: #000000; margin: 12px 0 0;">
      ParkApp
    </h1>

    <p class="ion-text-center" style="margin-top: 12px;">
      Gestion de Parqueaderos
    </p>
    <div class="separador"></div>

    <ion-list>
      <ion-item>
        <ion-input label="Usuario" labelPlacement="stacked" placeholder="Ingrese su nombre de Usuario" [(ngModel)]="usuario"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input type="password" label="Contraseña" [(ngModel)]="clave">
          <ion-input-password-toggle color="dark" slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>
    </ion-list>

    <div class="separador"></div>
    <ion-button expand="block" mode="ios" color="dark" (click)="login()">
      login
    </ion-button>

  </div>

</ion-content>
