

<ion-content [fullscreen]="true" >

  <div class="ion-padding">

    <div style="margin-top: 80px; width: 100%; height: 64px;"></div>
    
    <h1 class="ion-text-center" style="font-weight: 400; font-size: 64px;">
      ParkApp
    </h1>
    <p class="ion-text-center">
      Gestion de Parqueaderos
    </p>
    <div class="separador"></div>

    <!--  Usuario y Contraseña -->
    <ion-list>
      <ion-item>
        <ion-input label="Usuario" labelPlacement="stacked" placeholder="Ingrese su nombre de Usuario"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input type="password" label="Contraseña" >
          <ion-input-password-toggle color="dark" slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>
      
    </ion-list>

    <!-- Boton Login -->
    <div class="separador"></div>
    <ion-button expand="block" mode="ios" color="dark" routerLink="/tabsmenu/dashboard">
      login
    </ion-button>

    <!-- Enlace para crear una cuenta -->
    <div class="separador"></div>
    <p class="ion-text-center">
      Registrar una <strong routerLink="/registroapp">Nueva Cuenta de Usuario</strong>
    </p>

  </div>

</ion-content>
